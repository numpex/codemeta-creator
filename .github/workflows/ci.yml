name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: node:18.17
    steps:
      - name: install
        run: npm install
      - name: build
        run: npm run build
      # Output build is actually in 'out'
      - name: move
        run: rm -rf public ; mv out public
      - name: store
        uses: actions/upload-artifact@v4
	with:
	  name: public
	  path: public
