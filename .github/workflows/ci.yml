name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: install
        run: npm install
      - name: build
        run: npm run build
      # Output build is actually in 'out'
      - name: move
        run: rm -rf public ; mv out public
      - name: store
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/deploy-pages@v4
